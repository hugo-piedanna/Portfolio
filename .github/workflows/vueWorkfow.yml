name: Vue.js Workflow

on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'

      - name: Install dependencies
        run: npm install

      - name: Linting with ESLint
        run: npm run lint

      - name: Build and test
        run: npm run build
      
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22 # Port SSH par défaut (modifiable selon votre configuration)
          script: |
            cd httpdocs
            rm -rf * # Supprime tous les fichiers existants dans le dossier cible
            cp -r $GITHUB_WORKSPACE/dist/* ./httpdocs # Copie les fichiers générés vers le serveur
