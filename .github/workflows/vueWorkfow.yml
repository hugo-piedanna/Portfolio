name: Vue.js Workflow

on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'

      - name: Install dependencies
        run: npm install

      - name: Linting with ESLint
        run: npm run lint

      - name: Build and test
        run: npm run build
      
      - name: Deploy to Plesk
        uses: plesk/deploy-plesk-action@v1
        with:
          plesk-host: ${{ secrets.SERVER_HOST }}
          plesk-username: ${{ secrets.SERVER_USERNAME }}
          plesk-password: ${{ secrets.SERVER_PASSWORD }}
          source-directory: dist  # Dossier de build de Vue.js
          target-directory: httpdocs  # Dossier de déploiement sur Plesk
